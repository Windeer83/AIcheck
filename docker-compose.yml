services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: factcheck
      POSTGRES_USER: factcheck
      POSTGRES_PASSWORD: factcheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factcheck -d factcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://factcheck:factcheck@postgres:5432/factcheck
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
    volumes:
      - app_data:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://factcheck:factcheck@postgres:5432/factcheck
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
    volumes:
      - app_data:/data
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_APP_ACCESS_TOKEN: ${APP_ACCESS_TOKEN:-dev-token}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  app_data:

